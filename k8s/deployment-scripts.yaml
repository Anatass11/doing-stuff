apiVersion: apps/v1
kind: Deployment
metadata:
  name: mini-project-a
  namespace: my-apps
  labels:
    app: mini-project-a
spec:
  replicas: 2
  selector:
    matchLabels:
      app: mini-project-a
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: mini-project-a
    spec:
      containers:
        - name: mini-project-a
          image: myregistry/mini-project-a:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: "k8s"
            - name: JAVA_OPTS
              value: "-Xmx256m -XX:+UseContainerSupport"
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 5